services:
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "3001:3001"
    env_file: .env
    volumes:
      - api-data:/app/data
    environment:
      - DB_PATH=/app/data/clawops.db
      - DATABASE_URL=/app/data/clawops.db

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - api
    environment:
      - CLAWOPS_API_URL=http://api:3001

volumes:
  api-data:
