version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - CLAWOPS_MODE=local
      - CLAWOPS_DB_PATH=/data/clawops.db
      - PORT=3001
    volumes:
      - clawops_data:/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - CLAWOPS_API_URL=http://api:3001
    depends_on:
      - api

volumes:
  clawops_data:
